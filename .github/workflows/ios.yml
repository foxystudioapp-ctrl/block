name: iOS Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    # macos-latest, 15 Haziran 2026'da brand-new macOS 26'ya geçti; o havuz daha az
    # kapasiteli ve runner ataması güvenilmez ("job not acquired"). Kararlı macOS 15'e
    # sabitliyoruz (Xcode 16 latest-stable — bu proje için yeterli).
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Install Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build and Archive
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          # Extract Team ID and Profile UUID from Provisioning Profile
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i $PP_PATH))
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /dev/stdin <<< $(security cms -D -i $PP_PATH))

          # Auto-increment Build Number
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" ios/App/App/Info.plist
          
          # Create ExportOptions.plist
          cat <<EOF > $RUNNER_TEMP/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.askar.blockblast</key>
                  <string>$UUID</string>
              </dict>
          </dict>
          </plist>
          EOF
          
          # NOT: SPM bağımlılık target'ları (GoogleSignIn, AppAuth, RevenueCat, GoogleUtilities...)
          # provisioning profile DESTEKLEMEZ. Komut satırından profil verirsek xcodebuild onu
          # TÜM target'lara uygulamaya çalışır ve "does not support provisioning profiles" ile
          # patlar. Bu yüzden arşivi İMZASIZ üretiyoruz; imzalama + entitlement gömme işi
          # aşağıdaki Export adımına ait (ExportOptions ile yalnızca App target'ı imzalanır).
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates
          
          echo "Export klasörünün içi:"
          ls -R $RUNNER_TEMP/export

      - name: Verify Sign in with Apple entitlement
        run: |
          cd $RUNNER_TEMP/export
          IPA=$(ls *.ipa | head -1)
          echo "Doğrulanan IPA: $IPA"
          rm -rf verify && mkdir verify && cd verify
          unzip -q "../$IPA"
          APP=$(ls -d Payload/*.app)
          echo "=== $APP entitlements ==="
          ENT=$(codesign -d --entitlements :- "$APP" 2>/dev/null || codesign -d --entitlements - "$APP" 2>/dev/null)
          echo "$ENT"
          if echo "$ENT" | grep -q "com.apple.developer.applesignin"; then
            echo "✅ Sign in with Apple entitlement IPA içinde MEVCUT"
          else
            echo "❌ Sign in with Apple entitlement EKSİK — profil bu yetkiyi taşımıyor olabilir (App ID capability + secret'ı kontrol et)"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: blockblast-ios
          path: ${{ runner.temp }}/export

      - name: Upload to TestFlight
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          # Boşluk ve alt satır karakterlerini temizle (kopyalama hatalarına karşı)
          CLEAN_APPLE_ID=$(echo "$APPLE_ID" | tr -d '[:space:]')
          CLEAN_APP_PASSWORD=$(echo "$APP_PASSWORD" | tr -d '[:space:]')
          
          echo "TestFlight'a yükleniyor..."
          xcrun altool --upload-app -f $RUNNER_TEMP/export/*.ipa -t ios -u "$CLEAN_APPLE_ID" -p "$CLEAN_APP_PASSWORD"
