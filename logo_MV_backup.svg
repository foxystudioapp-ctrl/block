<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Dark Premium Background Gradient -->
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e103c"/>
      <stop offset="50%" stop-color="#0a0517"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Vibrant Block Gradients -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#7e22ce"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>

    <!-- Glass Overlay -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Glow & Shadow Filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#000" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="112" ry="112"/>
  
  <!-- Massive Core Glow -->
  <circle cx="256" cy="256" r="200" fill="#a855f7" opacity="0.3" filter="url(#glow)"/>

  <!-- MASSIVE 2D STAIRS (Right-to-Left) -->
  <!-- Block Size: 120, Gap: 10, Rx: 30 -->
  <g filter="url(#shadow)">
    
    <!-- Col 0 (Left - 3 Blocks) X=66 -->
    <g transform="translate(66, 66)">
      <rect width="120" height="120" rx="30" fill="url(#cyanGrad)"/>
      <rect width="120" height="120" rx="30" fill="url(#glass)"/>
      <rect width="120" height="120" rx="30" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
    </g>
    <g transform="translate(66, 196)">
      <rect width="120" height="120" rx="30" fill="url(#purpleGrad)"/>
      <rect width="120" height="120" rx="30" fill="url(#glass)"/>
      <rect width="120" height="120" rx="30" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
    </g>
    <g transform="translate(66, 326)">
      <rect width="120" height="120" rx="30" fill="url(#pinkGrad)"/>
      <rect width="120" height="120" rx="30" fill="url(#glass)"/>
      <rect width="120" height="120" rx="30" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
    </g>

    <!-- Col 1 (Mid - 2 Blocks) X=196 -->
    <g transform="translate(196, 196)">
      <rect width="120" height="120" rx="30" fill="url(#orangeGrad)"/>
      <rect width="120" height="120" rx="30" fill="url(#glass)"/>
      <rect width="120" height="120" rx="30" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
    </g>
    <g transform="translate(196, 326)">
      <rect width="120" height="120" rx="30" fill="url(#greenGrad)"/>
      <rect width="120" height="120" rx="30" fill="url(#glass)"/>
      <rect width="120" height="120" rx="30" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
    </g>

    <!-- Col 2 (Right - 1 Block) X=326 -->
    <g transform="translate(326, 326)">
      <rect width="120" height="120" rx="30" fill="url(#goldGrad)"/>
      <rect width="120" height="120" rx="30" fill="url(#glass)"/>
      <rect width="120" height="120" rx="30" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
    </g>

  </g>

  <!-- Accent Floating Blocks scaled up -->
  <g filter="url(#shadow)">
    <!-- Top Right Sparkle/Block -->
    <g transform="translate(350, 80) rotate(25 30 30)">
      <rect width="60" height="60" rx="16" fill="url(#cyanGrad)"/>
      <rect width="60" height="60" rx="16" fill="url(#glass)"/>
      <rect width="60" height="60" rx="16" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    </g>
    <!-- Mid Right Sparkle/Block -->
    <g transform="translate(410, 200) rotate(-15 20 20)">
      <rect width="45" height="45" rx="12" fill="url(#purpleGrad)"/>
      <rect width="45" height="45" rx="12" fill="url(#glass)"/>
      <rect width="45" height="45" rx="12" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    </g>
    <!-- Bottom Left Sparkle/Block -->
    <g transform="translate(20, 360) rotate(-20 20 20)">
      <rect width="40" height="40" rx="10" fill="url(#orangeGrad)"/>
      <rect width="40" height="40" rx="10" fill="url(#glass)"/>
      <rect width="40" height="40" rx="10" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    </g>
  </g>

</svg>
