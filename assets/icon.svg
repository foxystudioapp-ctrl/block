<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e103c"/>
      <stop offset="60%" stop-color="#05020d"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Glowing Cyber Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(168, 85, 247, 0.1)" stroke-width="1"/>
    </pattern>

    <!-- Block Gradients -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#0055ff"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#7e22ce"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>

    <!-- Base Glass Overlay -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Hard Diagonal Reflection (Polished Gem) -->
    <linearGradient id="sharpReflection" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="49%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity="0.95"/>
    </filter>

    <!-- Clip Path for Perfect Block Reflections -->
    <clipPath id="blockClip">
      <rect width="120" height="120" rx="30"/>
    </clipPath>
  </defs>

  <!-- Base Elements -->
  <rect width="512" height="512" fill="transparent"/>
  
  
  <!-- Volumetric Core Glow -->
  <g transform="translate(-64, -64) scale(1.25)">

  <circle cx="256" cy="256" r="220" fill="#a855f7" opacity="0.35" filter="url(#glow)"/>

  <!-- Glowing Stars/Particles -->
  <g filter="url(#glow)" opacity="0.8">
    <circle cx="100" cy="150" r="4" fill="#fff"/>
    <circle cx="450" cy="300" r="3" fill="#fff"/>
    <circle cx="250" cy="100" r="5" fill="#fde047"/>
    <circle cx="150" cy="450" r="4" fill="#00ffff"/>
    <circle cx="380" cy="400" r="6" fill="#e879f9"/>
  </g>

  <!-- MASSIVE 2D STAIRS (Right-to-Left) -->
  <g filter="url(#shadow)">
    
    <!-- Col 0 (Left - 3 Blocks) X=66 -->
    <!-- Block 1 -->
    <g transform="translate(66, 66)">
      <rect width="120" height="120" rx="30" fill="url(#cyanGrad)"/>
      <rect width="120" height="120" rx="30" fill="url(#glass)"/>
      <rect width="120" height="120" fill="url(#sharpReflection)" clip-path="url(#blockClip)"/>
      <rect width="120" height="120" rx="30" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
    </g>
    <!-- Block 2 -->
    <g transform="translate(66, 196)">
      <rect width="120" height="120" rx="30" fill="url(#purpleGrad)"/>
      <rect width="120" height="120" rx="30" fill="url(#glass)"/>
      <rect width="120" height="120" fill="url(#sharpReflection)" clip-path="url(#blockClip)"/>
      <rect width="120" height="120" rx="30" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
    </g>
    <!-- Block 3 -->
    <g transform="translate(66, 326)">
      <rect width="120" height="120" rx="30" fill="url(#pinkGrad)"/>
      <rect width="120" height="120" rx="30" fill="url(#glass)"/>
      <rect width="120" height="120" fill="url(#sharpReflection)" clip-path="url(#blockClip)"/>
      <rect width="120" height="120" rx="30" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
    </g>

    <!-- Col 1 (Mid - 2 Blocks) X=196 -->
    <!-- Block 4 -->
    <g transform="translate(196, 196)">
      <rect width="120" height="120" rx="30" fill="url(#orangeGrad)"/>
      <rect width="120" height="120" rx="30" fill="url(#glass)"/>
      <rect width="120" height="120" fill="url(#sharpReflection)" clip-path="url(#blockClip)"/>
      <rect width="120" height="120" rx="30" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
    </g>
    <!-- Block 5 -->
    <g transform="translate(196, 326)">
      <rect width="120" height="120" rx="30" fill="url(#greenGrad)"/>
      <rect width="120" height="120" rx="30" fill="url(#glass)"/>
      <rect width="120" height="120" fill="url(#sharpReflection)" clip-path="url(#blockClip)"/>
      <rect width="120" height="120" rx="30" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
    </g>

    <!-- Col 2 (Right - 1 Block) X=326 -->
    <!-- Block 6 -->
    <g transform="translate(326, 326)">
      <rect width="120" height="120" rx="30" fill="url(#goldGrad)"/>
      <rect width="120" height="120" rx="30" fill="url(#glass)"/>
      <rect width="120" height="120" fill="url(#sharpReflection)" clip-path="url(#blockClip)"/>
      <rect width="120" height="120" rx="30" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
    </g>

  </g>

  <!-- Enhanced Accent Floating Blocks -->
  <g filter="url(#shadow)">
    <!-- Top Right Sparkle/Block -->
    <g transform="translate(350, 80) rotate(25 30 30)">
      <rect width="60" height="60" rx="16" fill="url(#cyanGrad)"/>
      <rect width="60" height="60" rx="16" fill="url(#glass)"/>
      <rect width="60" height="60" rx="16" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
    </g>
    <!-- Mid Right Sparkle/Block -->
    <g transform="translate(420, 210) rotate(-15 20 20)">
      <rect width="45" height="45" rx="12" fill="url(#purpleGrad)"/>
      <rect width="45" height="45" rx="12" fill="url(#glass)"/>
      <rect width="45" height="45" rx="12" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
    </g>
    <!-- Bottom Left Sparkle/Block -->
    <g transform="translate(20, 370) rotate(-20 20 20)">
      <rect width="40" height="40" rx="10" fill="url(#orangeGrad)"/>
      <rect width="40" height="40" rx="10" fill="url(#glass)"/>
      <rect width="40" height="40" rx="10" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
    </g>
  </g>

  </g>
</svg>
